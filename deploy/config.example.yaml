server:
  listen: "127.0.0.1:8091"

palworld:
  base_url: "http://127.0.0.1:8212"
  username: ""
  password: ""
  timeout: "3s"

cache:
  info_ttl: "30s"
  metrics_ttl: "5s"
  players_ttl: "3s"

database:
  path: "./data/companion.db"

auth:
  session_ttl: "720h"
  # Deprecated Steam OpenID fields are accepted but unused.
  enabled: false
  public_base_url: ""
  admin_steam_ids: []

app:
  mock_mode: true

logging:
  level: "info"
